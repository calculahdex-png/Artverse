<script>
// ====================== CONFIGURAÇÕES ======================
let desenhosDB = [];
let currentUser = null;
let usersDB = [];
let followRelations = [];
let denunciasDB = [];
let reportsDB = [];
let postsUnsubscribe = null;
let adminList = [];
let adminMode = false;
let clickCount = 0;
let clickTimeout = null;

const STORAGE_KEY = "artverse_desenhos_final";
const USERS_KEY = "artverse_users";
const FOLLOWS_KEY = "artverse_follows";
const USER_KEY = "artverse_user_session";
const DENUNCIAS_KEY = "artverse_denuncias";
const REPORTS_KEY = "artverse_reports";
const ADMIN_LIST_KEY = "artverse_admins";

const OWNER_EMAIL = "natanaelsantanasantos75@gmail.com";
const DEFAULT_ADMINS = ["natanaelsantanasantos75@gmail.com", "edufer779@gmail.com"];
const ADMIN_SECRET = "haktaichu";

// ====================== CÓDIGO SECRETO (DASHBOARD) ======================
function setupSecretCode() {
    const titleElement = document.getElementById('appTitle');
    if (titleElement) {
        titleElement.addEventListener('click', function(e) {
            e.stopPropagation();
            clickCount++;
            
            if (clickTimeout) clearTimeout(clickTimeout);
            
            clickTimeout = setTimeout(() => {
                clickCount = 0;
            }, 1000);
            
            if (clickCount === 3) {
                const senha = prompt("🔐 Modo Admin - Digite a senha:");
                if (senha === ADMIN_SECRET) {
                    adminMode = true;
                    showToast("✅ Modo Admin ativado! Dashboard disponível.");
                    renderDashboardAdmin();
                } else {
                    showToast("❌ Senha incorreta!");
                    clickCount = 0;
                }
            }
        });
    }
}

// ====================== DASHBOARD ADMIN ======================
async function renderDashboardAdmin() {
    if (!adminMode) return;
    
    const container = document.getElementById('dashboardAdmin');
    if (!container) return;
    
    const totalPosts = desenhosDB.length;
    const totalLikes = desenhosDB.reduce((sum, p) => sum + (p.likes || 0), 0);
    const totalComments = desenhosDB.reduce((sum, p) => sum + (p.comments?.length || 0), 0);
    const avgLikes = totalPosts > 0 ? (totalLikes / totalPosts).toFixed(1) : 0;
    
    const categories = {};
    desenhosDB.forEach(post => {
        const cat = post.categoria || "Sem categoria";
        categories[cat] = (categories[cat] || 0) + 1;
    });
    
    const topPosts = [...desenhosDB].sort((a,b) => (b.likes||0) - (a.likes||0)).slice(0,5);
    const maxCategory = Math.max(...Object.values(categories), 1);
    
    container.style.display = 'block';
    container.innerHTML = `
        <div style="padding:24px 20px; max-width:1000px; margin:0 auto;">
            <div class="dashboard-panel">
                <div class="dashboard-header">
                    <h3 class="dashboard-title">📊 DASHBOARD ADMIN - Estatísticas Reais</h3>
                    <button class="dashboard-close" onclick="fecharDashboardAdmin()">❌ Fechar Dashboard</button>
                </div>
                
                <div class="dashboard-metrics">
                    <div class="dashboard-card">
                        <div class="dashboard-value">${totalPosts}</div>
                        <div class="dashboard-label">Total de Posts</div>
                    </div>
                    <div class="dashboard-card">
                        <div class="dashboard-value">${totalLikes}</div>
                        <div class="dashboard-label">Total de Curtidas</div>
                    </div>
                    <div class="dashboard-card">
                        <div class="dashboard-value">${totalComments}</div>
                        <div class="dashboard-label">Total de Comentários</div>
                    </div>
                    <div class="dashboard-card">
                        <div class="dashboard-value">${avgLikes}</div>
                        <div class="dashboard-label">Média de Likes/Post</div>
                    </div>
                </div>
                
                <div class="dashboard-chart">
                    <h4>📊 Posts por Categoria</h4>
                    <div id="categoryChartDashboard" style="display:flex; gap:15px; margin-top:15px; flex-wrap:wrap;"></div>
                </div>
                
                <div class="dashboard-chart">
                    <h4>🏆 Top 5 Posts Mais Curtidos</h4>
                    <div id="topPostsDashboard"></div>
                </div>
                
                <div class="dashboard-chart">
                    <h4>📅 Informações Adicionais</h4>
                    <div class="info-item">👥 Usuários Registrados: ${usersDB.length}</div>
                    <div class="info-item">🔌 Firebase: ✅ Conectado</div>
                    <div class="info-item">🕐 Última atualização: ${new Date().toLocaleTimeString()}</div>
                </div>
            </div>
        </div>
    `;
    
    const chartDiv = document.getElementById('categoryChartDashboard');
    if (chartDiv) {
        chartDiv.innerHTML = '';
        for (const [cat, count] of Object.entries(categories)) {
            const height = (count / maxCategory) * 100;
            chartDiv.innerHTML += `
                <div style="flex:1; text-align:center; min-width:70px;">
                    <div style="background:linear-gradient(180deg, #667eea, #764ba2); border-radius:8px; height:${height}px; transition:height 0.3s;"></div>
                    <div style="font-size:12px; margin-top:8px;">${cat}</div>
                    <div style="font-size:11px; font-weight:bold;">${count}</div>
                </div>
            `;
        }
    }
    
    const topDiv = document.getElementById('topPostsDashboard');
    if (topDiv) {
        if (topPosts.length === 0) {
            topDiv.innerHTML = '<p>Nenhum post ainda</p>';
        } else {
            topDiv.innerHTML = topPosts.map((post, i) => `
                <div class="comment-item">
                    <span><strong>${i+1}º</strong> ${post.descricao?.substring(0, 40)}...</span>
                    <span>❤️ ${post.likes || 0}</span>
                </div>
            `).join('');
        }
    }
}

function fecharDashboardAdmin() {
    const container = document.getElementById('dashboardAdmin');
    if (container) {
        container.style.display = 'none';
        adminMode = false;
        showToast("Dashboard fechado. Clique 3x no título para reabrir.");
    }
}

// ====================== FUNÇÕES DE ADMIN ======================
function carregarAdminList() {
    const stored = localStorage.getItem(ADMIN_LIST_KEY);
    if(stored) {
        adminList = JSON.parse(stored);
    } else {
        adminList = [...DEFAULT_ADMINS];
        saveAdminList();
    }
}

function saveAdminList() {
    localStorage.setItem(ADMIN_LIST_KEY, JSON.stringify(adminList));
}

function isOwner() {
    return currentUser && currentUser.email === OWNER_EMAIL;
}

function isAdmin() {
    return currentUser && adminList.includes(currentUser.email);
}

function getAdminTag() {
    if (currentUser && currentUser.email === OWNER_EMAIL) {
        return '<span class="owner-tag">🌟 DONO 🌟</span>';
    } else if (currentUser && adminList.includes(currentUser.email)) {
        return '<span class="admin-tag">🛡️ ADMIN 🛡️</span>';
    }
    return '';
}

function getUserTagByEmail(email) {
    if (email === OWNER_EMAIL) {
        return '<span class="owner-tag" style="font-size:0.6rem; margin-left:5px;">👑 DONO</span>';
    } else if (adminList.includes(email)) {
        return '<span class="admin-tag" style="font-size:0.6rem; margin-left:5px;">🛡️ ADMIN</span>';
    }
    return '';
}

function darAdmin(email) {
    if (!isOwner()) {
        showToast("❌ Apenas o DONO pode dar admin!");
        return false;
    }
    if (!adminList.includes(email)) {
        adminList.push(email);
        saveAdminList();
        showToast(`✅ ${email} agora é ADMIN!`);
        renderizarPerfilMenu();
        return true;
    } else {
        showToast(`⚠️ ${email} já é admin`);
        return false;
    }
}

function removerAdmin(email) {
    if (!isOwner()) {
        showToast("❌ Apenas o DONO pode remover admin!");
        return false;
    }
    if (email === OWNER_EMAIL) {
        showToast("❌ Não é possível remover o DONO!");
        return false;
    }
    const index = adminList.indexOf(email);
    if (index > -1) {
        adminList.splice(index, 1);
        saveAdminList();
        showToast(`⚠️ ${email} não é mais admin`);
        renderizarPerfilMenu();
        return true;
    } else {
        showToast(`⚠️ ${email} não é admin`);
        return false;
    }
}

// ====================== FIREBASE ======================
async function carregarPostsFirebase() {
    if (postsUnsubscribe) postsUnsubscribe();
    
    const q = query(collection(window.db, "posts"), orderBy("timestamp", "desc"));
    postsUnsubscribe = onSnapshot(q, (snapshot) => {
        desenhosDB = [];
        snapshot.forEach((doc) => {
            desenhosDB.push({ id: doc.id, ...doc.data() });
        });
        renderGallery();
        if (document.getElementById("galeria").classList.contains("active")) {
            renderGallery();
        }
        if (adminMode) renderDashboardAdmin();
        console.log("📸 Posts atualizados:", desenhosDB.length);
    });
}

async function salvarPostFirebase(post) {
    try {
        const docRef = await addDoc(collection(window.db, "posts"), post);
        return docRef.id;
    } catch (error) {
        showToast("Erro ao publicar.");
        return null;
    }
}

async function deletarPostFirebase(postId) {
    try {
        await deleteDoc(doc(window.db, "posts", postId));
        showToast("Post excluído!");
    } catch (error) {
        console.error("Erro ao deletar:", error);
    }
}

async function likePostFirebase(postId, userEmail) {
    const postRef = doc(window.db, "posts", postId);
    const post = desenhosDB.find(p => p.id === postId);
    if (post && post.likedBy && post.likedBy.includes(userEmail)) {
        await updateDoc(postRef, {
            likedBy: arrayRemove(userEmail),
            likes: (post.likes || 1) - 1
        });
    } else {
        await updateDoc(postRef, {
            likedBy: arrayUnion(userEmail),
            likes: (post.likes || 0) + 1
        });
    }
}

async function comentarPostFirebase(postId, comentario) {
    const postRef = doc(window.db, "posts", postId);
    const post = desenhosDB.find(p => p.id === postId);
    const novosComentarios = [...(post.comments || []), comentario];
    await updateDoc(postRef, { comments: novosComentarios });
}

function loadData() {

    if(stored) { desenhosDB = JSON.parse(stored); }
    else desenhosDB = [];
    
    const storedUsers = localStorage.getItem(USERS_KEY);
    if(storedUsers) usersDB = JSON.parse(storedUsers);
    else usersDB = [];

function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(desenhosDB)); }
function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersDB)); }
function saveFollows() { localStorage.setItem(FOLLOWS_KEY, JSON.stringify(followRelations)); }
function saveDenuncias() { localStorage.setItem(DENUNCIAS_KEY, JSON.stringify(denunciasDB)); }
function saveReports() { localStorage.setItem(REPORTS_KEY, JSON.stringify(reportsDB)); }

function getOrCreateUser(email, name) {
    let user = usersDB.find(u => u.email === email);
    if(!user) {
        user = { email, name, bio: "Artista digital 🎨", avatar: null, followers: [], following: [], posts: [] };
        usersDB.push(user);
        saveUsers();
    }
    return user;
}

function updateUserStats() {
    if(!currentUser) return;
    let user = usersDB.find(u => u.email === currentUser.email);
    if(user) {
        user.posts = desenhosDB.filter(p => p.autorEmail === currentUser.email).map(p => p.id);
        user.followers = followRelations.filter(f => f.followingEmail === currentUser.email).map(f => f.followerEmail);
        user.following = followRelations.filter(f => f.followerEmail === currentUser.email).map(f => f.followingEmail);
        saveUsers();
    }
}

async function publicarDesenho() {
    if(!currentUser) { showToast("Faça login primeiro!"); toggleSidebar(); return; }
    let file = document.getElementById("uploadImage").files[0];
    let desc = document.getElementById("descricaoPost").value.trim();
    let categoria = document.getElementById("categoriaPost").value;
    if(!file) { showToast("Adicione uma foto"); return; }
    if(!desc) { showToast("Adicione uma descrição"); return; }
    if(!categoria) { showToast("Selecione uma categoria"); return; }
    
    showToast("📤 Publicando...");
    
    let reader = new FileReader();
    reader.onload = async e => {
        let novo = { 
            imageData: e.target.result, 
            descricao: desc, 
            categoria: categoria, 
            autor: currentUser.name, 
            autorEmail: currentUser.email, 
            likes: 0, 
            likedBy: [], 
            comments: [], 
            timestamp: new Date().toISOString() 
        };
        
        await salvarPostFirebase(novo);
        
        document.getElementById("uploadImage").value = "";
        document.getElementById("descricaoPost").value = "";
        document.getElementById("categoriaPost").value = "";
        showToast("✅ Postado com sucesso!");
        openTab('galeria');
        renderizarPerfilMenu();
    };
    reader.readAsDataURL(file);
}

async function toggleLike(id) {
    if(!currentUser) { showToast("Login necessário"); return; }
    await likePostFirebase(id, currentUser.email);
}

async function adicionarComentario(postId) {
    if(!currentUser) { showToast("Login necessário"); return; }
    let input = document.getElementById(`comment-input-${postId}`);
    let texto = input.value.trim();
    if(!texto) return;
    
    let comentario = { 
        autor: currentUser.name, 
        autorEmail: currentUser.email, 
        texto: texto,
        timestamp: new Date().toISOString()
    };
    
    await comentarPostFirebase(postId, comentario);
    input.value = "";
}

function renderGallery() {
    let container = document.getElementById("gallery");
    if(!container) return;
    if(desenhosDB.length === 0) { container.innerHTML = "<div style='text-align:center;padding:60px'>✨ Nenhum desenho ainda. Seja o primeiro a postar!</div>"; return; }
    container.innerHTML = "";
    desenhosDB.forEach(post => {
        let liked = currentUser ? (post.likedBy && post.likedBy.includes(currentUser.email)) : false;
        let isUserAdmin = isAdmin();
        let userTag = getUserTagByEmail(post.autorEmail);
        let commentsHtml = "";
        if(post.comments) {
            post.comments.forEach((c, idx) => {
                let commenterTag = getUserTagByEmail(c.autorEmail);
                commentsHtml += `<div class="comment-item"><div class="comment-text"><span class="comment-author">${c.autor} ${commenterTag}:</span> ${c.texto}</div>
                <div><button class="report-comment" onclick="denunciarComentarioPrompt('${post.id}', ${idx})">⚠️</button></div></div>`;
            });
        }
        let card = document.createElement("div");
        card.className = "post-card";
        card.innerHTML = `
            <img class="post-img" src="${post.imageData}" onclick="openZoom('${post.imageData}')">
            <div class="post-info">
                <div class="post-user" onclick="verPerfilUsuario('${post.autorEmail}')">
                    ✏️ ${post.autor} ${userTag}
                </div>
                <div class="post-category">🏷️ ${post.categoria}</div>
                <div class="post-desc">📝 ${post.descricao}</div>
                <div class="post-stats">
                    <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">❤️ <span>${post.likes || 0}</span></button>
                    <span>🕒 ${new Date(post.timestamp).toLocaleDateString()}</span>
                    <button class="report-comment" onclick="denunciarPostPrompt('${post.id}')">🚨 Denunciar</button>
                    ${isUserAdmin ? `<button class="admin-delete" onclick="excluirPostAdmin('${post.id}')">🗑️</button>` : ''}
                </div>
                <div class="comments-section">${commentsHtml || "<p style='font-size:0.75rem;'>Sem comentários.</p>"}<div class="add-comment"><input id="comment-input-${post.id}" placeholder="Comente..."><button onclick="adicionarComentario('${post.id}')">Enviar</button></div></div>
            </div>
        `;
        container.appendChild(card);
    });
}

function denunciarPostPrompt(postId) {
    if(!currentUser) { showToast("Faça login para denunciar"); return; }
    let motivo = prompt("Descreva o motivo da denúncia:");
    if(motivo) denunciarPost(postId, motivo);
}

function denunciarComentarioPrompt(postId, idx) {
    if(!currentUser) { showToast("Faça login para denunciar"); return; }
    let motivo = prompt("Descreva o motivo da denúncia deste comentário:");
    if(motivo) denunciarComentario(postId, idx, motivo);
}

function verPerfilUsuario(email) {
    let user = usersDB.find(u => u.email === email);
    if(!user) return;
    alert(`👤 ${user.name}\n📝 ${user.bio}`);
}

function abrirSuporte() {
    if(!currentUser) { showToast("Faça login para enviar mensagem"); toggleSidebar(); return; }
    let assunto = prompt("Assunto da mensagem:");
    let mensagem = prompt("Descreva seu problema, sugestão ou denúncia:");
    if(mensagem) {
        adicionarReport(mensagem, assunto || "Suporte");
        showToast("Mensagem enviada! Obrigado pelo contato.");
    }
}

function pesquisarDesenhos() { 
    let termo = document.getElementById("searchInput").value.toLowerCase(); 
    let resultados = desenhosDB.filter(p => p.descricao.toLowerCase().includes(termo) || p.autor.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo)); 
    let container = document.getElementById("resultadosPesquisa"); 
    if(resultados.length === 0) { container.innerHTML = "<p style='text-align:center;padding:40px;'>Nenhum resultado encontrado</p>"; return; } 
    container.innerHTML = ""; 
    resultados.forEach(post => { 
        let userTag = getUserTagByEmail(post.autorEmail);
        container.innerHTML += `<div class="post-card"><img class="post-img" src="${post.imageData}" onclick="openZoom('${post.imageData}')"><div class="post-info"><div class="post-category">🏷️ ${post.categoria}</div><div class="post-user">🎨 ${post.autor} ${userTag}</div><div class="post-desc">📝 ${post.descricao}</div><div>❤️ ${post.likes || 0} curtidas</div></div></div>`; 
    }); 
}

function buscarPorTopico(t) { 
    document.getElementById("searchInput").value = t; 
    pesquisarDesenhos(); 
}

function openZoom(src) { 
    document.getElementById("zoomImage").src = src; 
    document.getElementById("zoomModal").style.display = "flex"; 
}

function closeZoom() { 
    document.getElementById("zoomModal").style.display = "none"; 
}

function showToast(msg) { 
    let t = document.createElement("div"); 
    t.className = "toast-msg"; 
    t.innerText = msg; 
    document.body.appendChild(t); 
    setTimeout(()=>t.remove(),2500); 
}

function openTab(id) { 
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); 
    document.getElementById(id).classList.add("active"); 
    if(id==="galeria") renderGallery(); 
    if(id==="pesquisa") pesquisarDesenhos(); 
}

function toggleSidebar() { 
    document.getElementById("sidebar").classList.toggle("open"); 
    document.querySelector(".sidebar-overlay").classList.toggle("open"); 
}

window.onload = () => { 
    loadData(); 
    initGoogleAuth(); 
    loadTheme(); 
    renderizarPerfilMenu(); 
    setupSecretCode();
};
</script>
