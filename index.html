<script>
// ====================== CONFIGURAÇÕES ======================
let desenhosDB = [];
let currentUser = null;
let usersDB = [];
let followRelations = [];
let denunciasDB = [];
let reportsDB = [];
let postsUnsubscribe = null;
let adminList = []; // Lista de emails que são admins

const STORAGE_KEY = "artverse_desenhos_final";
const USERS_KEY = "artverse_users";
const FOLLOWS_KEY = "artverse_follows";
const USER_KEY = "artverse_user_session";
const DENUNCIAS_KEY = "artverse_denuncias";
const REPORTS_KEY = "artverse_reports";
const ADMIN_LIST_KEY = "artverse_admins";

// DONO ORIGINAL (só ele pode dar/remover admin)
const OWNER_EMAIL = "natanaelsantanasantos75@gmail.com";
// ADMINS FIXOS (já incluídos)
const DEFAULT_ADMINS = ["natanaelsantanasantos75@gmail.com", "edufer779@gmail.com"];

// ====================== FUNÇÕES DE ADMIN ======================
function carregarAdminList() {
    const stored = localStorage.getItem(ADMIN_LIST_KEY);
    if(stored) {
        adminList = JSON.parse(stored);
    } else {
        adminList = [...DEFAULT_ADMINS];
        saveAdminList();
    }
}

function saveAdminList() {
    localStorage.setItem(ADMIN_LIST_KEY, JSON.stringify(adminList));
}

function isOwner() {
    return currentUser && currentUser.email === OWNER_EMAIL;
}

function isAdmin() {
    return currentUser && adminList.includes(currentUser.email);
}

function getAdminTag() {
    if (currentUser && currentUser.email === OWNER_EMAIL) {
        return '<span class="owner-tag">🌟 DONO 🌟</span>';
    } else if (currentUser && adminList.includes(currentUser.email)) {
        return '<span class="admin-tag">🛡️ ADMIN 🛡️</span>';
    }
    return '';
}

function getUserTagByEmail(email) {
    if (email === OWNER_EMAIL) {
        return '<span class="owner-tag" style="font-size:0.6rem; margin-left:5px;">👑 DONO</span>';
    } else if (adminList.includes(email)) {
        return '<span class="admin-tag" style="font-size:0.6rem; margin-left:5px;">🛡️ ADMIN</span>';
    }
    return '';
}

// Dar admin para um usuário (apenas dono)
function darAdmin(email) {
    if (!isOwner()) {
        showToast("❌ Apenas o DONO pode dar admin!");
        return false;
    }
    if (!adminList.includes(email)) {
        adminList.push(email);
        saveAdminList();
        showToast(`✅ ${email} agora é ADMIN!`);
        renderizarPerfilMenu();
        return true;
    } else {
        showToast(`⚠️ ${email} já é admin`);
        return false;
    }
}

// Remover admin (apenas dono)
function removerAdmin(email) {
    if (!isOwner()) {
        showToast("❌ Apenas o DONO pode remover admin!");
        return false;
    }
    if (email === OWNER_EMAIL) {
        showToast("❌ Não é possível remover o DONO!");
        return false;
    }
    const index = adminList.indexOf(email);
    if (index > -1) {
        adminList.splice(index, 1);
        saveAdminList();
        showToast(`⚠️ ${email} não é mais admin`);
        renderizarPerfilMenu();
        return true;
    } else {
        showToast(`⚠️ ${email} não é admin`);
        return false;
    }
}

// ====================== FIREBASE FUNCTIONS ======================
async function carregarPostsFirebase() {
    if (postsUnsubscribe) postsUnsubscribe();
    
    const q = query(collection(window.db, "posts"), orderBy("timestamp", "desc"));
    postsUnsubscribe = onSnapshot(q, (snapshot) => {
        desenhosDB = [];
        snapshot.forEach((doc) => {
            desenhosDB.push({ id: doc.id, ...doc.data() });
        });
        renderGallery();
        if (document.getElementById("galeria").classList.contains("active")) {
            renderGallery();
        }
        console.log("📸 Posts atualizados em tempo real:", desenhosDB.length);
    });
}

async function salvarPostFirebase(post) {
    try {
        const docRef = await addDoc(collection(window.db, "posts"), post);
        console.log("Post salvo no Firebase com ID:", docRef.id);
        return docRef.id;
    } catch (error) {
        console.error("Erro ao salvar post:", error);
        showToast("Erro ao publicar. Tente novamente.");
        return null;
    }
}

async function deletarPostFirebase(postId) {
    try {
        await deleteDoc(doc(window.db, "posts", postId));
        console.log("Post deletado:", postId);
        showToast("Post excluído!");
    } catch (error) {
        console.error("Erro ao deletar:", error);
    }
}

async function likePostFirebase(postId, userEmail) {
    const postRef = doc(window.db, "posts", postId);
    const post = desenhosDB.find(p => p.id === postId);
    if (post && post.likedBy && post.likedBy.includes(userEmail)) {
        await updateDoc(postRef, {
            likedBy: arrayRemove(userEmail),
            likes: (post.likes || 1) - 1
        });
    } else {
        await updateDoc(postRef, {
            likedBy: arrayUnion(userEmail),
            likes: (post.likes || 0) + 1
        });
    }
}

async function comentarPostFirebase(postId, comentario) {
    const postRef = doc(window.db, "posts", postId);
    const post = desenhosDB.find(p => p.id === postId);
    const novosComentarios = [...(post.comments || []), comentario];
    await updateDoc(postRef, { comments: novosComentarios });
}

function garantirAdminLocal() {
    for (const adminEmail of DEFAULT_ADMINS) {
        let adminExists = usersDB.find(u => u.email === adminEmail);
        if (!adminExists) {
            usersDB.push({
                email: adminEmail,
                name: adminEmail === OWNER_EMAIL ? "ArtVerse Creator" : "ArtVerse Admin",
                bio: adminEmail === OWNER_EMAIL ? "🎨 Criador do ArtVerse | Desenvolvedor" : "🛡️ Administrador do ArtVerse",
                avatar: null,
                followers: [],
                following: [],
                posts: [],
                password: adminEmail === OWNER_EMAIL ? "25122008" : "admin123"
            });
        }
    }
    saveUsers();
}

function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) { desenhosDB = JSON.parse(stored); desenhosDB.forEach(p => { if(!p.comments) p.comments = []; if(!p.likedBy) p.likedBy = []; p.likes = p.likedBy.length; }); }
    else desenhosDB = [];
    
    const storedUsers = localStorage.getItem(USERS_KEY);
    if(storedUsers) usersDB = JSON.parse(storedUsers);
    else usersDB = [];
    
    carregarAdminList();
    garantirAdminLocal();
    
    const storedFollows = localStorage.getItem(FOLLOWS_KEY);
    if(storedFollows) followRelations = JSON.parse(storedFollows);
    else followRelations = [];
    
    const storedDenuncias = localStorage.getItem(DENUNCIAS_KEY);
    if(storedDenuncias) denunciasDB = JSON.parse(storedDenuncias);
    else denunciasDB = [];
    
    const storedReports = localStorage.getItem(REPORTS_KEY);
    if(storedReports) reportsDB = JSON.parse(storedReports);
    else reportsDB = [];
    
    const storedUser = localStorage.getItem(USER_KEY);
    if(storedUser) {
        currentUser = JSON.parse(storedUser);
        getOrCreateUser(currentUser.email, currentUser.name);
        updateUserStats();
    }
    
    carregarPostsFirebase();
    renderizarPerfilMenu();
}

function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(desenhosDB)); }
function saveUsers() { localStorage.setItem(USERS_KEY, JSON.stringify(usersDB)); }
function saveFollows() { localStorage.setItem(FOLLOWS_KEY, JSON.stringify(followRelations)); }
function saveDenuncias() { localStorage.setItem(DENUNCIAS_KEY, JSON.stringify(denunciasDB)); }
function saveReports() { localStorage.setItem(REPORTS_KEY, JSON.stringify(reportsDB)); }

function getOrCreateUser(email, name) {
    let user = usersDB.find(u => u.email === email);
    if(!user) {
        user = { email, name, bio: "Artista digital 🎨", avatar: null, followers: [], following: [], posts: [] };
        usersDB.push(user);
        saveUsers();
    }
    return user;
}

function updateUserStats() {
    if(!currentUser) return;
    let user = usersDB.find(u => u.email === currentUser.email);
    if(user) {
        user.posts = desenhosDB.filter(p => p.autorEmail === currentUser.email).map(p => p.id);
        user.followers = followRelations.filter(f => f.followingEmail === currentUser.email).map(f => f.followerEmail);
        user.following = followRelations.filter(f => f.followerEmail === currentUser.email).map(f => f.followingEmail);
        saveUsers();
    }
}

function toggleTheme() {
    const isLight = document.body.classList.contains('light');
    if(isLight) {
        document.body.classList.remove('light');
        localStorage.setItem('theme', 'dark');
        document.getElementById('themeToggleBtn').innerHTML = '🌙';
    } else {
        document.body.classList.add('light');
        localStorage.setItem('theme', 'light');
        document.getElementById('themeToggleBtn').innerHTML = '☀️';
    }
}

function loadTheme() {
    if(localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeToggleBtn').innerHTML = '☀️';
    } else {
        document.getElementById('themeToggleBtn').innerHTML = '🌙';
    }
}

function fazerLogin() {
    const email = document.getElementById("loginEmail")?.value.trim();
    const password = document.getElementById("loginPassword")?.value;
    
    if(!email || !password) { showToast("Preencha email e senha"); return; }
    
    const user = usersDB.find(u => u.email === email && u.password === password);
    if(user) {
        currentUser = { name: user.name, email: user.email };
        localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
        updateUserStats();
        renderizarPerfilMenu();
        showToast(`✅ Bem-vindo, ${user.name}!`);
    } else {
        showToast("❌ Email ou senha incorretos");
    }
}

function criarConta() {
    const name = document.getElementById("newName")?.value.trim();
    const email = document.getElementById("newEmail")?.value.trim();
    const password = document.getElementById("newPassword")?.value;
    
    if(!name || !email || !password) { showToast("Preencha todos os campos"); return; }
    if(usersDB.find(u => u.email === email)) { showToast("Email já cadastrado"); return; }
    
    const newUser = { email, name, bio: "Artista digital 🎨", avatar: null, followers: [], following: [], posts: [], password: password };
    usersDB.push(newUser);
    saveUsers();
    
    currentUser = { name: name, email: email };
    localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
    updateUserStats();
    renderizarPerfilMenu();
    showToast(`✅ Conta criada! Bem-vindo, ${name}!`);
}

function tentarLoginGoogle() {
    if(typeof google !== 'undefined') {
        google.accounts.id.prompt();
    } else {
        showToast("Google API não carregou. Use email/senha.");
    }
}

function initGoogleAuth() {
    if(typeof google !== 'undefined') {
        google.accounts.id.initialize({
            client_id: "1080629698570-egc1i3vsrg4ms9m7j73h4vkh0c6f8ggd.apps.googleusercontent.com",
            callback: (response) => {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                if(payload.email) {
                    let user = usersDB.find(u => u.email === payload.email);
                    if(!user) {
                        user = { email: payload.email, name: payload.name, bio: "Artista digital 🎨", avatar: payload.picture, followers: [], following: [], posts: [] };
                        usersDB.push(user);
                        saveUsers();
                    }
                    currentUser = { name: user.name, email: user.email };
                    localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
                    updateUserStats();
                    renderizarPerfilMenu();
                    showToast(`✅ Conectado como ${currentUser.name}`);
                }
            },
            auto_select: false
        });
    }
}

function showAdminTab(tab) {
    document.querySelectorAll('.admin-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
    const id = tab === 'denuncias' ? 'adminDenuncias' : (tab === 'reports' ? 'adminReports' : 'adminGerenciar');
    document.getElementById(id).classList.add('active');
    if(event && event.target) event.target.classList.add('active');
}

function resolverDenuncia(id) {
    const denuncia = denunciasDB.find(d => d.id === id);
    if(denuncia) {
        denuncia.resolvido = true;
        saveDenuncias();
        renderizarPerfilMenu();
        showToast("Denúncia marcada como resolvida");
    }
}

function resolverReport(id) {
    const report = reportsDB.find(r => r.id === id);
    if(report) {
        report.resolvido = true;
        saveReports();
        renderizarPerfilMenu();
        showToast("Mensagem marcada como lida");
    }
}

function excluirPostAdmin(postId) {
    deletarPostFirebase(postId);
    desenhosDB = desenhosDB.filter(p => p.id !== postId);
    saveToLocal();
    renderGallery();
    renderizarPerfilMenu();
}

function excluirPostDenunciado(postId) {
    excluirPostAdmin(postId);
}

function adicionarDenuncia(tipo, alvoId, motivo) {
    const novaDenuncia = {
        id: Date.now(),
        tipo: tipo,
        alvoId: alvoId,
        motivo: motivo,
        reportadoPor: currentUser?.email || "Anônimo",
        data: new Date().toISOString(),
        resolvido: false
    };
    denunciasDB.push(novaDenuncia);
    saveDenuncias();
    if(isAdmin()) renderizarPerfilMenu();
}

function adicionarReport(mensagem, assunto) {
    const novoReport = {
        id: Date.now(),
        assunto: assunto || "Suporte",
        mensagem: mensagem,
        enviadoPor: currentUser?.email || "Anônimo",
        data: new Date().toISOString(),
        resolvido: false
    };
    reportsDB.push(novoReport);
    saveReports();
    if(isAdmin()) renderizarPerfilMenu();
}

function denunciarPost(postId, motivo) {
    if(!currentUser) { showToast("Faça login para denunciar"); return; }
    adicionarDenuncia("Postagem", postId, motivo);
    showToast("Denúncia enviada para análise!");
}

function denunciarComentario(postId, commentIdx, motivo) {
    if(!currentUser) { showToast("Faça login para denunciar"); return; }
    const post = desenhosDB.find(p => p.id === postId);
    if(post && post.comments[commentIdx]) {
        adicionarDenuncia("Comentário", `${postId}-${commentIdx}`, `Comentário: "${post.comments[commentIdx].texto}"\nAutor: ${post.comments[commentIdx].autor}\nMotivo: ${motivo}`);
        showToast("Comentário denunciado!");
    }
}

function atualizarAvatar(input) {
    if(input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            let user = usersDB.find(u => u.email === currentUser.email);
            user.avatar = e.target.result;
            saveUsers();
            renderizarPerfilMenu();
            showToast("Avatar atualizado!");
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function mostrarSeguindo() {

    area.innerHTML = user.following.length ? `<p>${user.following.length} seguindo</p><div style="font-size:0.7rem; opacity:0.6;">*emails ocultos por privacidade</div>` : "<p>Não segue ninguém</p>";

}

    document.getElementById("settingsPanel").classList.add("show");
    let user = usersDB.find(u => u.email === currentUser.email);
    document.getElementById("editBio").value = user?.bio || "";
}

function fecharConfiguracoes() {

}

function salvarBio() {
    let user = usersDB.find(u => u.email === currentUser.email);
    if(user) {
        user.bio = document.getElementById("editBio").value;
        saveUsers();
        showToast("Biografia atualizada!");
        fecharConfiguracoes();

function logoutUser() {
    localStorage.removeItem(USER_KEY);
    currentUser = null;
    renderizarPerfilMenu();
    showToast("Desconectado");
}

async function publicarDesenho() {
    if(!currentUser) { showToast("Faça login primeiro!"); toggleSidebar(); return; }
    let file = document.getElementById("uploadImage").files[0];
    let desc = document.getElementById("descricaoPost").value.trim();
    let categoria = document.getElementById("categoriaPost").value;
    if(!file) { showToast("Adicione uma foto"); return; }
    if(!desc) { showToast("Adicione uma descrição"); return; }
    if(!categoria) { showToast("Selecione uma categoria"); return; }
    
    showToast("📤 Publicando...");
    
    let reader = new FileReader();
    reader.onload = async e => {
        let novo = { 
            imageData: e.target.result, 
            descricao: desc, 
            categoria: categoria, 
            autor: currentUser.name, 
            autorEmail: currentUser.email, 
            likes: 0, 
            likedBy: [], 
            comments: [], 
            timestamp: new Date().toISOString() 
        };
        
        await salvarPostFirebase(novo);
        
        document.getElementById("uploadImage").value = "";
        document.getElementById("descricaoPost").value = "";
        document.getElementById("categoriaPost").value = "";
        showToast("✅ Postado com sucesso!");
        openTab('galeria');
        renderizarPerfilMenu();
    };
    reader.readAsDataURL(file);
}

async function toggleLike(id) {
    if(!currentUser) { showToast("Login necessário"); return; }
    await likePostFirebase(id, currentUser.email);
}

async function adicionarComentario(postId) {
    if(!currentUser) { showToast("Login necessário"); return; }
    let input = document.getElementById(`comment-input-${postId}`);
    let texto = input.value.trim();
    if(!texto) return;
    
    let comentario = { 
        autor: currentUser.name, 
        autorEmail: currentUser.email, 
        texto: texto,
        timestamp: new Date().toISOString()
    };
    
    await comentarPostFirebase(postId, comentario);
    input.value = "";
}

function renderGallery() {
    let container = document.getElementById("gallery");
    if(!container) return;
    if(desenhosDB.length === 0) { container.innerHTML = "<div style='text-align:center;padding:60px'>✨ Nenhum desenho ainda. Seja o primeiro a postar!</div>"; return; }
    container.innerHTML = "";
    desenhosDB.forEach(post => {
        let liked = currentUser ? (post.likedBy && post.likedBy.includes(currentUser.email)) : false;
        let isUserAdmin = isAdmin();
        let userTag = getUserTagByEmail(post.autorEmail);
        let commentsHtml = "";
        if(post.comments) {
            post.comments.forEach((c, idx) => {
                let commenterTag = getUserTagByEmail(c.autorEmail);
                commentsHtml += `<div class="comment-item"><div class="comment-text"><span class="comment-author">${c.autor} ${commenterTag}:</span> ${c.texto}</div>
                <div><button class="report-comment" onclick="denunciarComentarioPrompt('${post.id}', ${idx})">⚠️</button></div></div>`;
            });
        }
        let card = document.createElement("div");
        card.className = "post-card";
        card.innerHTML = `
            <img class="post-img" src="${post.imageData}" onclick="openZoom('${post.imageData}')">
            <div class="post-info">
                <div class="post-user" onclick="verPerfilUsuario('${post.autorEmail}')">
                    ✏️ ${post.autor} ${userTag}
                </div>
                <div class="post-category">🏷️ ${post.categoria}</div>
                <div class="post-desc">📝 ${post.descricao}</div>
                <div class="post-stats">
                    <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">❤️ <span>${post.likes || 0}</span></button>
                    <span>🕒 ${new Date(post.timestamp).toLocaleDateString()}</span>
                    <button class="report-comment" onclick="denunciarPostPrompt('${post.id}')">🚨 Denunciar</button>
                    ${isUserAdmin ? `<button class="admin-delete" onclick="excluirPostAdmin('${post.id}')">🗑️</button>` : ''}
                </div>
                <div class="comments-section">${commentsHtml || "<p style='font-size:0.75rem;'>Sem comentários.</p>"}<div class="add-comment"><input id="comment-input-${post.id}" placeholder="Comente..."><button onclick="adicionarComentario('${post.id}')">Enviar</button></div></div>
            </div>
        `;
        container.appendChild(card);
    });
}

function denunciarPostPrompt(postId) {
    if(!currentUser) { showToast("Faça login para denunciar"); return; }
    let motivo = prompt("Descreva o motivo da denúncia (conteúdo ofensivo, spam, etc.):");
    if(motivo) denunciarPost(postId, motivo);
}

function denunciarComentarioPrompt(postId, idx) {
    if(!currentUser) { showToast("Faça login para denunciar"); return; }
    let motivo = prompt("Descreva o motivo da denúncia deste comentário:");
    if(motivo) denunciarComentario(postId, idx, motivo);
}

function verPerfilUsuario(email) {
    let user = usersDB.find(u => u.email === email);
    if(!user) return;
    let isOwnerUser = email === OWNER_EMAIL;
    let isAdminUser = adminList.includes(email);
    let tag = isOwnerUser ? " 🌟 DONO" : (isAdminUser ? " 🛡️ ADMIN" : "");
    alert(`👤 ${user.name}${tag}\n📝 ${user.bio}\n📸 Posts: ${user.posts.length}\n👥 Seguidores: ${user.followers.length}`);
}

function abrirSuporte() {
    if(!currentUser) { showToast("Faça login para enviar mensagem"); toggleSidebar(); return; }
    let assunto = prompt("Assunto da mensagem:");
    let mensagem = prompt("Descreva seu problema, sugestão ou denúncia:");
    if(mensagem) {
        adicionarReport(mensagem, assunto || "Suporte");
        showToast("Mensagem enviada! Obrigado pelo contato.");
    }
}

function pesquisarDesenhos() { 
    let termo = document.getElementById("searchInput").value.toLowerCase(); 
    let resultados = desenhosDB.filter(p => p.descricao.toLowerCase().includes(termo) || p.autor.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo)); 
    let container = document.getElementById("resultadosPesquisa"); 
    if(resultados.length === 0) { container.innerHTML = "<p style='text-align:center;padding:40px;'>Nenhum resultado encontrado</p>"; return; } 
    container.innerHTML = ""; 
    resultados.forEach(post => { 
        let userTag = getUserTagByEmail(post.autorEmail);
        container.innerHTML += `<div class="post-card"><img class="post-img" src="${post.imageData}" onclick="openZoom('${post.imageData}')"><div class="post-info"><div class="post-category">🏷️ ${post.categoria}</div><div class="post-user">🎨 ${post.autor} ${userTag}</div><div class="post-desc">📝 ${post.descricao}</div><div>❤️ ${post.likes || 0} curtidas</div></div></div>`; 
    }); 
}

function buscarPorTopico(t) { 
    document.getElementById("searchInput").value = t; 
    pesquisarDesenhos(); 
}

function openZoom(src) { 
    document.getElementById("zoomImage").src = src; 
    document.getElementById("zoomModal").style.display = "flex"; 
}

function closeZoom() { 
    document.getElementById("zoomModal").style.display = "none"; 
}

function showToast(msg) { 
    let t = document.createElement("div"); 
    t.className = "toast-msg"; 
    t.innerText = msg; 
    document.body.appendChild(t); 
    setTimeout(()=>t.remove(),2500); 
}

function openTab(id) { 
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); 
    document.getElementById(id).classList.add("active"); 
    if(id==="galeria") renderGallery(); 
    if(id==="pesquisa") pesquisarDesenhos(); 
}

function toggleSidebar() { 
    document.getElementById("sidebar").classList.toggle("open"); 
    document.querySelector(".sidebar-overlay").classList.toggle("open"); 
}

window.onload = () => { 
    loadData(); 
    initGoogleAuth(); 
    loadTheme(); 
    renderizarPerfilMenu(); 
};
</script>
